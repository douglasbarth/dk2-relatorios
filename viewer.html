<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Relatório — DK2 Conecta</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f7;color:#1a1d2e;min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:24px 16px 48px}
.header{background:linear-gradient(135deg,#1a1a2e,#0f3460);border-radius:14px;padding:32px 36px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.logo-box{width:36px;height:36px;background:linear-gradient(135deg,#e8620a,#f59e0b);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:white;letter-spacing:-.5px}
.agencia-name{color:white;font-size:15px;font-weight:700}
.report-title{color:white;font-size:24px;font-weight:800;margin-bottom:6px}
.report-sub{color:rgba(255,255,255,.6);font-size:13px}
.periodo-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(232,98,10,.15);border:1px solid rgba(232,98,10,.3);border-radius:20px;padding:6px 16px;margin-top:12px}
.periodo-badge span{color:#f97316;font-size:13px;font-weight:700}
.header-right{text-align:right}
.cliente-lbl{color:rgba(255,255,255,.4);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.cliente-nome{color:white;font-size:18px;font-weight:700}
.roas-lbl{color:rgba(255,255,255,.4);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-top:16px}
.roas-val{color:#4ade80;font-size:32px;font-weight:800}
.funnel-section{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:12px;padding:24px 28px;margin-bottom:20px}
.funnel-title{color:white;font-size:14px;font-weight:700;margin-bottom:20px}
.funnel-step{display:flex;align-items:center;gap:12px}
.funnel-bar-wrap{flex:1;background:rgba(255,255,255,.08);border-radius:8px;overflow:hidden}
.funnel-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:8px;min-width:90px}
.funnel-bar-label{color:white;font-size:12px;font-weight:700}
.funnel-bar-val{color:white;font-size:16px;font-weight:800}
.funnel-pct{width:50px;text-align:right}
.funnel-pct-val{font-size:12px;font-weight:600;color:rgba(255,255,255,.5)}
.funnel-arrow{color:rgba(255,255,255,.3);padding:3px 0 3px 30px;font-size:14px}
.calc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.calc-card{background:white;border-radius:10px;padding:16px 18px;border-left:4px solid #e8620a;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.calc-card-label{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.calc-card-value{font-size:18px;font-weight:800;color:#1a1d2e}
.card{background:white;border-radius:12px;padding:24px 28px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:14px;font-weight:700;color:#1a1d2e;margin-bottom:16px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8f9fc;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 12px;border-bottom:1px solid #f0f2f7}
.insights{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1px solid #bbf7d0;border-radius:12px;padding:24px 28px;margin-bottom:20px}
.insights-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.insights-badge{background:linear-gradient(135deg,#16a34a,#15803d);color:white;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:1px;text-transform:uppercase}
.insights-title{font-size:14px;font-weight:700;color:#14532d}
.insight-item{display:flex;gap:12px;margin-bottom:12px}
.insight-dot{width:6px;height:6px;background:#16a34a;border-radius:50%;margin-top:6px;flex-shrink:0}
.insight-text{font-size:13px;color:#1c4532;line-height:1.6}
.error-state{text-align:center;padding:80px 20px;color:#6b7280}
.error-icon{font-size:56px;margin-bottom:16px}
.error-title{font-size:22px;font-weight:700;margin-bottom:8px;color:#374151}
.footer{text-align:center;padding:24px;color:#9aa0b0;font-size:12px;border-top:1px solid #e5e7eb;margin-top:12px}
@media(max-width:500px){
  .header{flex-direction:column}
  .header-right{text-align:left}
  .two-col{grid-template-columns:1fr}
}
@media print{
  body{background:white}
  .footer{display:none}
  .header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .funnel-section{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div class="wrap">
  <div id="app"></div>
  <div class="footer">Relatório gerado por <strong>DK2 Conecta</strong> · Marketing Digital</div>
</div>
<script>
// ── Formatters ────────────────────────────────────────────────────────────────
function brl(v){return(parseFloat(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function num(v){return(parseInt(v)||0).toLocaleString('pt-BR');}
function roasF(v){return`${(parseFloat(v)||0).toFixed(2)}x`;}
function pctF(v){return`${(parseFloat(v)||0).toFixed(1)}%`;}
function mesLabel(m){
  if(!m)return'';
  const[y,mo]=m.split('-');
  const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return`${meses[parseInt(mo)-1]||''} ${y}`;
}

// ── Cálculos ──────────────────────────────────────────────────────────────────
function calcular(tipo,d){
  const inv=parseFloat(d.investimento)||0;
  const leads=parseInt(d.leads)||0;
  const c={};
  if(tipo==='clinica'){
    const ag=parseInt(d.agendados)||0,comp=parseInt(d.compareceram)||0,fech=parseInt(d.fechamentos)||0,ref=parseFloat(d.receita_efetivada)||0;
    c.cpl=leads>0?inv/leads:0;c.custo_agendamento=ag>0?inv/ag:0;c.custo_comparecimento=comp>0?inv/comp:0;c.custo_fechamento=fech>0?inv/fech:0;c.roas=inv>0?ref/inv:0;c.tx_ag=leads>0?ag/leads*100:0;c.tx_comp=ag>0?comp/ag*100:0;c.tx_fech=comp>0?fech/comp*100:0;
  }else if(tipo==='corretor'){
    const ag=parseInt(d.agendados)||0,vis=parseInt(d.visitas)||0,cont=parseInt(d.contratos)||0,val=parseFloat(d.valor_vendido)||0,pctC=parseFloat(d.comissao_pct)||6,comissao=val*(pctC/100);
    c.cpl=leads>0?inv/leads:0;c.custo_visita=vis>0?inv/vis:0;c.custo_contrato=cont>0?inv/cont:0;c.roas=inv>0?comissao/inv:0;c.comissao=comissao;c.tx_ag=leads>0?ag/leads*100:0;c.tx_vis=ag>0?vis/ag*100:0;c.tx_cont=vis>0?cont/vis*100:0;
  }else if(tipo==='pousada'){
    const cont=parseInt(d.contatos)||0,res=parseInt(d.reservas)||0,chk=parseInt(d.checkins)||0,rec=parseFloat(d.receita)||0;
    c.cpl=leads>0?inv/leads:0;c.custo_contato=cont>0?inv/cont:0;c.custo_reserva=res>0?inv/res:0;c.custo_checkin=chk>0?inv/chk:0;c.roas=inv>0?rec/inv:0;c.tx_cont=leads>0?cont/leads*100:0;c.tx_res=cont>0?res/cont*100:0;c.tx_chk=res>0?chk/res*100:0;
  }else if(tipo==='construtora'){
    const reun=parseInt(d.reunioes)||0,orc=parseInt(d.orcamentos)||0,cont=parseInt(d.contratos)||0,val=parseFloat(d.valor_contratado)||0;
    c.cpl=leads>0?inv/leads:0;c.custo_reuniao=reun>0?inv/reun:0;c.custo_orcamento=orc>0?inv/orc:0;c.custo_contrato=cont>0?inv/cont:0;c.roas=inv>0?val/inv:0;c.tx_reun=leads>0?reun/leads*100:0;c.tx_orc=reun>0?orc/reun*100:0;c.tx_cont=orc>0?cont/orc*100:0;
  }
  return c;
}

// ── Funil ─────────────────────────────────────────────────────────────────────
function buildFunnel(tipo,d){
  const defs={
    clinica:[{k:'leads',label:'Leads Gerados',cor:'#f59e0b'},{k:'agendados',label:'Agendados',cor:'#ec4899'},{k:'compareceram',label:'Compareceram',cor:'#60a5fa'},{k:'fechamentos',label:'Fechamentos',cor:'#a78bfa'}],
    corretor:[{k:'leads',label:'Leads Gerados',cor:'#f59e0b'},{k:'agendados',label:'Agendados',cor:'#ec4899'},{k:'visitas',label:'Visitas',cor:'#60a5fa'},{k:'contratos',label:'Contratos',cor:'#4ade80'}],
    pousada:[{k:'leads',label:'Leads',cor:'#f59e0b'},{k:'contatos',label:'Contatos',cor:'#ec4899'},{k:'reservas',label:'Reservas',cor:'#60a5fa'},{k:'checkins',label:'Check-ins',cor:'#4ade80'}],
    construtora:[{k:'leads',label:'Leads',cor:'#f59e0b'},{k:'reunioes',label:'Reuniões',cor:'#ec4899'},{k:'orcamentos',label:'Orçamentos',cor:'#60a5fa'},{k:'contratos',label:'Contratos',cor:'#a78bfa'}],
  };
  const steps=defs[tipo]||[];
  const vals=steps.map(s=>parseInt(d[s.k])||0);
  const maxVal=Math.max(...vals,1);
  return steps.map((s,i)=>{
    const v=vals[i];
    const w=Math.max(20,Math.round(v/maxVal*100));
    const prev=i>0?vals[i-1]:0;
    const pctLabel=i>0&&prev>0?pctF(v/prev*100):'';
    return`${i>0?`<div class="funnel-arrow">▼</div>`:''}
      <div class="funnel-step">
        <div class="funnel-bar-wrap">
          <div class="funnel-bar" style="background:${s.cor};width:${w}%">
            <span class="funnel-bar-label">${s.label}</span>
            <span class="funnel-bar-val">${num(v)}</span>
          </div>
        </div>
        <div class="funnel-pct"><span class="funnel-pct-val">${pctLabel}</span></div>
      </div>`;
  }).join('');
}

// ── KPIs ─────────────────────────────────────────────────────────────────────
function buildKpis(tipo,d,c){
  const defs={
    clinica:[{label:'Investimento',val:brl(d.investimento),cor:'#1877f2'},{label:'Custo por Lead',val:brl(c.cpl),cor:'#e8620a'},{label:'Custo/Agendamento',val:brl(c.custo_agendamento),cor:'#9c27b0'},{label:'Custo/Comparecimento',val:brl(c.custo_comparecimento),cor:'#0891b2'},{label:'Custo/Fechamento',val:brl(c.custo_fechamento),cor:'#ea4335'},{label:'ROAS',val:roasF(c.roas),cor:'#16a34a'}],
    corretor:[{label:'Investimento',val:brl(d.investimento),cor:'#1877f2'},{label:'Custo por Lead',val:brl(c.cpl),cor:'#e8620a'},{label:'Custo por Visita',val:brl(c.custo_visita),cor:'#9c27b0'},{label:'Custo por Contrato',val:brl(c.custo_contrato),cor:'#ea4335'},{label:'Comissão Gerada',val:brl(c.comissao),cor:'#0891b2'},{label:'ROAS',val:roasF(c.roas),cor:'#16a34a'}],
    pousada:[{label:'Investimento',val:brl(d.investimento),cor:'#1877f2'},{label:'Custo por Lead',val:brl(c.cpl),cor:'#e8620a'},{label:'Custo por Reserva',val:brl(c.custo_reserva),cor:'#9c27b0'},{label:'Custo por Check-in',val:brl(c.custo_checkin),cor:'#0891b2'},{label:'Receita Total',val:brl(d.receita),cor:'#ea4335'},{label:'ROAS',val:roasF(c.roas),cor:'#16a34a'}],
    construtora:[{label:'Investimento',val:brl(d.investimento),cor:'#1877f2'},{label:'Custo por Lead',val:brl(c.cpl),cor:'#e8620a'},{label:'Custo por Reunião',val:brl(c.custo_reuniao),cor:'#9c27b0'},{label:'Custo por Orçamento',val:brl(c.custo_orcamento),cor:'#0891b2'},{label:'Custo por Contrato',val:brl(c.custo_contrato),cor:'#ea4335'},{label:'ROAS',val:roasF(c.roas),cor:'#16a34a'}],
  };
  return(defs[tipo]||[]).map(k=>`<div class="calc-card" style="border-left-color:${k.cor}"><div class="calc-card-label">${k.label}</div><div class="calc-card-value">${k.val}</div></div>`).join('');
}

// ── Insights ──────────────────────────────────────────────────────────────────
function buildInsights(tipo,d,c){
  const items=[];
  const rv=parseFloat(c.roas)||0;
  if(rv>=4)items.push(`<strong>Excelente retorno:</strong> ROAS de ${roasF(c.roas)} — cada R$&nbsp;1 investido gerou R$&nbsp;${rv.toFixed(2)} em retorno. Resultado acima da média do setor.`);
  else if(rv>=2)items.push(`<strong>Retorno positivo:</strong> ROAS de ${roasF(c.roas)}. Há oportunidade de otimização para aumentar o retorno sobre o investimento.`);
  else if(rv>0)items.push(`<strong>Atenção ao ROAS:</strong> ${roasF(c.roas)} está abaixo do ideal. Recomenda-se revisar segmentações e criativos.`);
  if(tipo==='clinica'){
    const txComp=parseFloat(c.tx_comp)||0,txFech=parseFloat(c.tx_fech)||0;
    if(txComp<50)items.push(`<strong>Taxa de comparecimento baixa (${pctF(txComp)}):</strong> confirmação automática via WhatsApp pode reduzir o no-show.`);
    if(txFech>50)items.push(`<strong>Alta taxa de fechamento (${pctF(txFech)}):</strong> mais da metade dos pacientes que compareceram fecharam tratamento. Equipe bem alinhada.`);
    items.push(`<strong>Recomendação:</strong> com CPL de ${brl(c.cpl)}, foque em aumentar o volume de leads mantendo a qualidade de segmentação.`);
  }else if(tipo==='corretor'){
    items.push(`<strong>Comissão gerada:</strong> ${brl(c.comissao)} com investimento de ${brl(d.investimento)}. Custo por contrato: ${brl(c.custo_contrato)}.`);
    items.push(`<strong>Recomendação:</strong> remarketing para leads que agendaram mas não visitaram pode aumentar a taxa de visitas.`);
  }else if(tipo==='pousada'){
    if(d.diaria_media)items.push(`<strong>Diária média de ${brl(d.diaria_media)}:</strong> com ${num(d.checkins)} check-ins, há potencial para upsell de serviços adicionais.`);
    items.push(`<strong>Recomendação:</strong> campanhas com antecedência de 30-45 dias tendem a gerar reservas de maior valor no setor hoteleiro.`);
  }else if(tipo==='construtora'){
    items.push(`<strong>Pipeline gerado:</strong> de ${num(d.leads)} leads até ${num(d.contratos)} contrato(s) — ${brl(d.valor_contratado)} em obras.`);
    items.push(`<strong>Recomendação:</strong> nutrição dos leads em orçamento via e-mail e WhatsApp aumenta a conversão no ciclo longo da construção civil.`);
  }
  return items.map(t=>`<div class="insight-item"><div class="insight-dot"></div><div class="insight-text">${t}</div></div>`).join('');
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  const hash=location.hash.slice(1);
  if(!hash){
    app.innerHTML=`<div class="error-state"><div class="error-icon">🔗</div><div class="error-title">Link inválido</div><p>Este link não contém dados de relatório.</p></div>`;
    return;
  }
  let p;
  try{p=JSON.parse(decodeURIComponent(atob(hash)));}
  catch(e){
    app.innerHTML=`<div class="error-state"><div class="error-icon">⚠️</div><div class="error-title">Erro ao carregar relatório</div><p>O link pode estar corrompido. Solicite um novo link.</p></div>`;
    return;
  }

  const tipo=p.cliente.tipo;
  const d=p.dados;
  const c=calcular(tipo,d);
  const clienteNome=p.cliente.nome;
  const agencia=p.agencia||'DK2 Conecta';
  const isPeriodo=p.tipo==='periodo';
  const periodoLabel=isPeriodo?`${mesLabel(p.inicio)} a ${mesLabel(p.fim)}`:mesLabel(p.mes);

  document.title=`Relatório ${clienteNome} — ${periodoLabel}`;

  // Header
  const headerHtml=`<div class="header">
    <div>
      <div class="logo-row">
        <div class="logo-box">DK2</div>
        <div class="agencia-name">${agencia}</div>
      </div>
      <div class="report-title">${isPeriodo?'Relatório de Período':'Relatório de Performance'}</div>
      <div class="report-sub">${isPeriodo?`${p.meses} mês(es) · ${tipo}`:periodoLabel}</div>
      ${isPeriodo?`<div class="periodo-badge"><span>📅 ${periodoLabel}</span></div>`:''}
    </div>
    <div class="header-right">
      <div class="cliente-lbl">Cliente</div>
      <div class="cliente-nome">${clienteNome}</div>
      <div class="roas-lbl">${isPeriodo?'ROAS do Período':'ROAS'}</div>
      <div class="roas-val">${roasF(c.roas)}</div>
    </div>
  </div>`;

  // Hero totais (período)
  let heroHtml='';
  if(isPeriodo){
    const labelR=tipo==='clinica'?'Receita Efetivada':tipo==='corretor'?'Comissão Gerada':tipo==='pousada'?'Receita Total':'Valor Contratado';
    const recT=tipo==='clinica'?d.receita_efetivada||0:tipo==='corretor'?c.comissao||0:tipo==='pousada'?d.receita||0:d.valor_contratado||0;
    heroHtml=`<div class="two-col">
      <div style="background:linear-gradient(135deg,#7c2d12,#9a3412);border-radius:14px;padding:22px 28px">
        <div style="color:rgba(255,255,255,.6);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">💸 Investimento Total</div>
        <div style="color:white;font-size:28px;font-weight:900">${brl(d.investimento)}</div>
      </div>
      <div style="background:linear-gradient(135deg,#14532d,#166534);border-radius:14px;padding:22px 28px">
        <div style="color:rgba(255,255,255,.6);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">💰 ${labelR}</div>
        <div style="color:#4ade80;font-size:28px;font-weight:900">${brl(recT)}</div>
      </div>
    </div>`;
  }

  // Receita boxes (clínica mensal)
  let receitaHtml='';
  if(tipo==='clinica'&&!isPeriodo){
    receitaHtml=`<div class="two-col">
      <div style="background:linear-gradient(135deg,#16a34a,#15803d);border-radius:12px;padding:20px 24px">
        <div style="color:rgba(255,255,255,.7);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Tratamentos Efetivados</div>
        <div style="color:white;font-size:24px;font-weight:800">${brl(d.receita_efetivada)}</div>
      </div>
      <div style="background:linear-gradient(135deg,#dc2626,#b91c1c);border-radius:12px;padding:20px 24px">
        <div style="color:rgba(255,255,255,.7);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Tratamentos Não Efetivados</div>
        <div style="color:white;font-size:24px;font-weight:800">${brl(d.receita_nao_efetivada)}</div>
      </div>
    </div>`;
  }

  // Tabela mês a mês (período)
  let mesTableHtml='';
  if(isPeriodo&&p.mesesData&&p.mesesData.length>1){
    const labelR=tipo==='clinica'?'Receita':tipo==='corretor'?'Comissão':tipo==='pousada'?'Receita':'Valor Contratado';
    const rows=p.mesesData.map(r=>{
      const rd=r.dados;const rc=calcular(tipo,rd);
      const rec=tipo==='clinica'?rd.receita_efetivada||0:tipo==='corretor'?rc.comissao||0:tipo==='pousada'?rd.receita||0:rd.valor_contratado||0;
      return`<tr>
        <td><strong>${mesLabel(r.mes)}</strong></td>
        <td>${num(rd.leads)}</td>
        <td>${brl(rd.investimento)}</td>
        <td style="color:#16a34a;font-weight:600">${brl(rec)}</td>
        <td style="font-weight:800;color:${(rc.roas||0)>=3?'#16a34a':'#b45309'}">${roasF(rc.roas)}</td>
      </tr>`;
    }).join('');
    mesTableHtml=`<div class="card">
      <div class="card-title">📅 Detalhamento Mês a Mês</div>
      <table>
        <thead><tr><th>Mês</th><th>Leads</th><th>Investimento</th><th>${labelR}</th><th>ROAS</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  app.innerHTML=`
    ${headerHtml}
    ${heroHtml}
    ${receitaHtml}
    <div class="funnel-section">
      <div class="funnel-title">📉 Funil de Conversão${isPeriodo?' — Acumulado':''}</div>
      ${buildFunnel(tipo,d)}
    </div>
    <div class="calc-grid">${buildKpis(tipo,d,c)}</div>
    ${mesTableHtml}
    <div class="insights">
      <div class="insights-header">
        <span class="insights-badge">✦ Análise</span>
        <span class="insights-title">Insights do Período</span>
      </div>
      ${buildInsights(tipo,d,c)}
    </div>
  `;
}
